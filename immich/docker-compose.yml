name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    extends:
      file: hwaccel.transcoding.yml
      service: quicksync
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - ${THUMB_LOCATION}:/data/thumbs
      - ${ENCODED_VIDEO_LOCATION}:/data/encoded-video
      - ${PROFILE_LOCATION}:/data/profile
      - ${BACKUP_LOCATION}:/data/backups
      - /etc/localtime:/etc/localtime:ro
      - /media/daniel/google-photos:/mnt/google-photos
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    labels:
      - "pangolin.proxy-resources.immich.name=Immich Photos"
      - "pangolin.proxy-resources.immich.protocol=http"
      - "pangolin.proxy-resources.immich.full-domain=photos.${DOMAIN}"
      - "pangolin.proxy-resources.immich.targets[0].enabled=true"
      - "pangolin.proxy-resources.immich.targets[0].method=http"
      # Pangolin target health check (immich's unauthenticated ping endpoint)
      - "pangolin.proxy-resources.immich.targets[0].healthcheck.hostname=immich_server"
      - "pangolin.proxy-resources.immich.targets[0].healthcheck.port=2283"
      - "pangolin.proxy-resources.immich.targets[0].healthcheck.path=/api/server/ping"
      # WUD: release tags only (skip commit-* sha tags)
      - 'wud.tag.include=^v\d+\.\d+\.\d+$$'
      # $$ escapes $ for Compose; WUD receives ${original} (see ~/dev/wud docs/configuration)
      - 'wud.link.template=https://github.com/immich-app/immich/releases/tag/$${original}'
    networks:
      - proxy
      - immich
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-openvino
    extends:
      file: hwaccel.ml.yml
      service: openvino
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    labels:
      # WUD: match server tags with -openvino suffix only
      - 'wud.tag.include=^v\d+\.\d+\.\d+-openvino$$'
      - 'wud.link.template=https://github.com/immich-app/immich/releases/tag/v$${major}.$${minor}.$${patch}'
    networks:
      - immich
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    # Matches Immich v2.7.5 release compose (Valkey 9)
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    labels:
      - 'wud.tag.include=^9$$'
    environment:
      - TZ=${TZ}
    networks:
      - immich
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS=--data-checksums
      - TZ=${TZ}
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    labels:
      # Immich-supported Postgres major only (avoid suggesting PG18 while on 14-vectorchord line)
      - 'wud.tag.include=^14-vectorchord.*$$'
    networks:
      - immich
    shm_size: 128mb
    restart: always

volumes:
  model-cache:

networks:
  proxy:
    external: true
  immich:
