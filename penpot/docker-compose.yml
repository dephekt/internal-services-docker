name: penpot

x-penpot-flags: &penpot-flags
  PENPOT_FLAGS: enable-login-with-oidc enable-oidc-registration disable-login-with-password enable-prepl-server enable-mcp

x-penpot-public-uri: &penpot-public-uri
  PENPOT_PUBLIC_URI: https://design.ai.${DOMAIN}

x-penpot-body-size: &penpot-body-size
  PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600
  PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600

services:
  penpot-frontend:
    image: "penpotapp/frontend:${PENPOT_VERSION:-2.16}"
    container_name: penpot-frontend
    restart: unless-stopped
    ports:
      - "9001:8080"
    volumes:
      - penpot-assets:/opt/data/assets
    depends_on:
      - penpot-backend
      - penpot-exporter
      - penpot-mcp
    environment:
      <<: [*penpot-flags, *penpot-public-uri, *penpot-body-size]
      PENPOT_OIDC_NAME: Keycloak
    labels:
      - "pangolin.proxy-resources.penpot.name=Penpot"
      - "pangolin.proxy-resources.penpot.protocol=http"
      - "pangolin.proxy-resources.penpot.full-domain=design.ai.${DOMAIN}"
      - "pangolin.proxy-resources.penpot.targets[0].enabled=true"
      - "pangolin.proxy-resources.penpot.targets[0].method=http"
      - "pangolin.proxy-resources.penpot.targets[0].port=8080"
      - "pangolin.proxy-resources.penpot.targets[0].healthcheck.hostname=penpot-frontend"
      - "pangolin.proxy-resources.penpot.targets[0].healthcheck.port=8080"
      - "pangolin.proxy-resources.penpot.targets[0].healthcheck.path=/"
      - "pangolin.proxy-resources.penpot.auth.sso-enabled=false"
      - 'wud.tag.include=^\d+\.\d+(\.\d+)?$$'
    networks:
      - penpot
      - proxy

  penpot-backend:
    image: "penpotapp/backend:${PENPOT_VERSION:-2.16}"
    container_name: penpot-backend
    restart: unless-stopped
    env_file:
      - secrets/penpot.env
    volumes:
      - penpot-assets:/opt/data/assets
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-valkey:
        condition: service_healthy
    environment:
      <<: [*penpot-flags, *penpot-public-uri, *penpot-body-size]
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_OBJECTS_STORAGE_BACKEND: fs
      PENPOT_OBJECTS_STORAGE_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
      PENPOT_TELEMETRY_REFERER: media-stack-compose
      PENPOT_OIDC_CLIENT_ID: penpot
      PENPOT_OIDC_BASE_URI: https://auth.${DOMAIN}/realms/home/
      PENPOT_OIDC_AUTH_URI: https://auth.${DOMAIN}/realms/home/protocol/openid-connect/auth
      PENPOT_OIDC_TOKEN_URI: http://auth:8080/realms/home/protocol/openid-connect/token
      PENPOT_OIDC_USER_URI: http://auth:8080/realms/home/protocol/openid-connect/userinfo
      PENPOT_OIDC_JWKS_URI: http://auth:8080/realms/home/protocol/openid-connect/certs
      PENPOT_OIDC_SCOPES: openid profile email
      PENPOT_OIDC_NAME_ATTR: preferred_username
      PENPOT_OIDC_EMAIL_ATTR: email
      PENPOT_SSRF_ALLOWED_HOSTS: auth auth.${DOMAIN}
    networks:
      - penpot
      - core

  penpot-mcp:
    image: "penpotapp/mcp:${PENPOT_VERSION:-2.16}"
    container_name: penpot-mcp
    restart: unless-stopped
    networks:
      - penpot

  penpot-exporter:
    image: "penpotapp/exporter:${PENPOT_VERSION:-2.16}"
    container_name: penpot-exporter
    restart: unless-stopped
    env_file:
      - secrets/penpot.env
    depends_on:
      penpot-valkey:
        condition: service_healthy
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
      PENPOT_REDIS_URI: redis://penpot-valkey/0
    networks:
      - penpot

  penpot-postgres:
    image: postgres:15
    container_name: penpot-postgres
    restart: unless-stopped
    stop_signal: SIGINT
    env_file:
      - secrets/penpot.env
    environment:
      - POSTGRES_INITDB_ARGS=--data-checksums
      - POSTGRES_DB=penpot
      - POSTGRES_USER=penpot
    volumes:
      - penpot-postgres-v15:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 2s
    networks:
      - penpot

  penpot-valkey:
    image: valkey/valkey:8.1
    container_name: penpot-valkey
    restart: unless-stopped
    environment:
      - VALKEY_EXTRA_FLAGS=--maxmemory 128mb --maxmemory-policy volatile-lfu
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - penpot

volumes:
  penpot-postgres-v15:
  penpot-assets:

networks:
  penpot:
  proxy:
    external: true
  core:
    external: true
    name: core_core
