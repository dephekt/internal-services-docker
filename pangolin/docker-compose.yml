# NOTE: This stack deploys via the `pangolin-edge` Docker context (remote
# daemon over SSH). With a remote context, compose resolves bind-mount paths
# against the LOCAL filesystem and sends those paths to the remote daemon,
# which auto-creates empty directories if they don't exist on the remote.
# Therefore bind mounts MUST use absolute paths that exist on the EDGE host
# (/opt/pangolin/...). Relative `./config` would resolve to the local
# /home/daniel/docker/pangolin/config and the remote would mount an empty
# directory -- breaking pangolin's config load at startup.
name: pangolin
services:
  pangolin:
    image: docker.io/fosrl/pangolin:ee-1.19.4
    container_name: pangolin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - /opt/pangolin/config:/app/config
    ports:
      - "127.0.0.1:3003:3003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "10s"
      timeout: "10s"
      retries: 15
    labels:
      - 'wud.tag.include=^ee-\d+\.\d+\.\d+$$'

  gerbil:
    image: docker.io/fosrl/gerbil:1.4.2
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - /opt/pangolin/config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 443:443/udp # For http3 QUIC if desired
      - 80:80
    labels:
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'

  traefik:
    image: docker.io/traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil # Ports appear on the gerbil service
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    env_file:
      # env_file paths are read by the local compose CLI (not the remote daemon),
      # so this stays relative to the local repo's compose.yml location.
      - secrets/pangolin.env
    volumes:
      - /opt/pangolin/config/traefik:/etc/traefik:ro # Volume to store the Traefik configuration
      - /opt/pangolin/config/letsencrypt:/letsencrypt # Volume to store the Let's Encrypt certificates
      - /opt/pangolin/config/traefik/logs:/var/log/traefik # Volume to store Traefik logs
    labels:
      - 'wud.tag.include=^v\d+\.\d+(\.\d+)?$$'

networks:
  default:
    driver: bridge
    name: pangolin
