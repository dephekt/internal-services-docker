services:
  mosquitto-site:
    image: eclipse-mosquitto:2.0.20
    container_name: mosquitto-site
    restart: unless-stopped
    entrypoint: ["/mqtt-entrypoint/site-entrypoint.sh"]
    ports:
      - "1883:1883"          # LAN-exposed for ESPHome edge devices (NOT Pangolin)
    volumes:
      - ./site/config:/mosquitto/config:ro
      - ./entrypoint:/mqtt-entrypoint:ro
      - mosquitto-site-data:/mosquitto/data
    secrets:
      - MQTT_EDGE_PASSWORD
      - MQTT_GROW_APP_SITE_PASSWORD
      - MQTT_RECORDER_PASSWORD
    networks:
      - mqtt
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -E -t grow/daniel-home/_healthcheck -u edge-daniel-home -P \"$$(cat /run/secrets/MQTT_EDGE_PASSWORD)\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 10s

volumes:
  mosquitto-site-data:

networks:
  mqtt:
    name: grow-mqtt

secrets:
  MQTT_EDGE_PASSWORD:
    file: ./secrets/MQTT_EDGE_PASSWORD
  MQTT_GROW_APP_SITE_PASSWORD:
    file: ./secrets/MQTT_GROW_APP_SITE_PASSWORD
  MQTT_RECORDER_PASSWORD:
    file: ./secrets/MQTT_RECORDER_PASSWORD
