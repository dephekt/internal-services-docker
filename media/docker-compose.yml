name: media

services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.8
    container_name: jellyfin
    restart: unless-stopped
    user: 1000:1000
    group_add:
      - "993"  # render group for GPU access
    devices:
      # my gpu render node is /dev/dri/renderR129
      - /dev/dri:/dev/dri
    ports:
      - "8096:8096"
      - "7359:7359/udp"
    environment:
      - TZ=${TZ}
    volumes:
      - type: bind
        source: /mnt/data/docker/media/jellyfin-config
        target: /config
        bind:
          create_host_path: false
      - type: bind
        source: /mnt/data/docker/media/jellyfin-cache
        target: /cache
        bind:
          create_host_path: false
      - /media/daniel/streaming:/media
      - ./jellyfin-web-config.json:/jellyfin/jellyfin-web/config.json
    labels:
      - "pangolin.proxy-resources.jellyfin.name=Streaming"
      - "pangolin.proxy-resources.jellyfin.protocol=http"
      - "pangolin.proxy-resources.jellyfin.full-domain=stream.${DOMAIN}"
      - "pangolin.proxy-resources.jellyfin.targets[0].port=8096"
      - "pangolin.proxy-resources.jellyfin.targets[0].enabled=true"
      - "pangolin.proxy-resources.jellyfin.targets[0].method=http"
      # WUD: semver only (skip nightly e.g. 2026042706-arm64)
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
    networks:
      - proxy
      - core
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  radarr:
    image: docker.io/linuxserver/radarr:6.0.4.10291-ls289
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - type: bind
        source: /mnt/data/docker/media/radarr-config
        target: /config
        bind:
          create_host_path: false
      - /media/daniel/streaming:/media
    labels:
      - "pangolin.proxy-resources.radarr.name=Radarr"
      - "pangolin.proxy-resources.radarr.protocol=http"
      - "pangolin.proxy-resources.radarr.full-domain=movies.stream.${DOMAIN}"
      - "pangolin.proxy-resources.radarr.targets[0].enabled=true"
      - "pangolin.proxy-resources.radarr.targets[0].method=http"
      - "pangolin.proxy-resources.radarr.auth.sso-enabled=true"
      # WUD: Force Docker Hub registry for LinuxServer images
      - "wud.watch.registry=docker.io"
      - "wud.watch.repository=linuxserver/radarr"
      # WUD: stable LSIO app version + build (skip testing-* / odd tags)
      - 'wud.tag.include=^\d+\.\d+\.\d+\.\d+-ls\d+$$'
    networks:
      - proxy

  sonarr:
    image: docker.io/linuxserver/sonarr:4.0.16.2944-ls300
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - type: bind
        source: /mnt/data/docker/media/sonarr-config
        target: /config
        bind:
          create_host_path: false
      - /media/daniel/streaming:/media
    labels:
      - "pangolin.proxy-resources.sonarr.name=Sonarr"
      - "pangolin.proxy-resources.sonarr.protocol=http"
      - "pangolin.proxy-resources.sonarr.full-domain=shows.stream.${DOMAIN}"
      - "pangolin.proxy-resources.sonarr.targets[0].enabled=true"
      - "pangolin.proxy-resources.sonarr.targets[0].method=http"
      - "pangolin.proxy-resources.sonarr.auth.sso-enabled=true"
      # WUD: Force Docker Hub registry for LinuxServer images
      - "wud.watch.registry=docker.io"
      - "wud.watch.repository=linuxserver/sonarr"
      - 'wud.tag.include=^\d+\.\d+\.\d+\.\d+-ls\d+$$'
    networks:
      - proxy

  nzbget:
    image: docker.io/linuxserver/nzbget:v25.4-ls225
    container_name: nzbget
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - type: bind
        source: /mnt/data/docker/media/nzbget-config
        target: /config
        bind:
          create_host_path: false
      - type: bind
        source: /mnt/data/downloads
        target: /downloads
        bind:
          create_host_path: false
      - /media/daniel/streaming:/media
    labels:
      - "pangolin.proxy-resources.nzbget.name=NZBGet"
      - "pangolin.proxy-resources.nzbget.protocol=http"
      - "pangolin.proxy-resources.nzbget.full-domain=grabs.stream.${DOMAIN}"
      - "pangolin.proxy-resources.nzbget.targets[0].enabled=true"
      - "pangolin.proxy-resources.nzbget.targets[0].method=http"
      - "pangolin.proxy-resources.nzbget.auth.sso-enabled=true"
      # WUD: Force Docker Hub registry for LinuxServer images
      - "wud.watch.registry=docker.io"
      - "wud.watch.repository=linuxserver/nzbget"
      # NZBGet tags look like v25.4-ls225 (skip testing-version-* / prerelease)
      - 'wud.tag.include=^v\d+\.\d+-ls\d+$$'
    networks:
      - proxy

  seerr:
    image: ghcr.io/fallenbagel/jellyseerr@sha256:499fbe958fa4a0c93172a231c14898986556bb28bd5cd569a0f41dbf887b04d7
    init: true
    container_name: seerr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    volumes:
      - seerr-config:/app/config
    labels:
      - "pangolin.proxy-resources.seerr.name=Requests"
      - "pangolin.proxy-resources.seerr.protocol=http"
      - "pangolin.proxy-resources.seerr.full-domain=requests.stream.${DOMAIN}"
      - "pangolin.proxy-resources.seerr.targets[0].enabled=true"
      - "pangolin.proxy-resources.seerr.targets[0].method=http"
      - "pangolin.proxy-resources.seerr.targets[0].port=5055"
      - "pangolin.proxy-resources.seerr.auth.sso-enabled=true"
      - "pangolin.proxy-resources.seerr.auth.sso-roles[0]=Member"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5055/api/v1/status"]
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

volumes:
  seerr-config:

networks:
  proxy:
    external: true
  core:
    external: true
    name: core_core
