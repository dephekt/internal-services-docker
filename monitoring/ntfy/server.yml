# ntfy server configuration
# Reference: https://docs.ntfy.sh/config/

# Public-facing base URL — used for link generation in notifications.
base-url: https://ntfy.dephekt.net

# Upstream relay for iOS instant push via APNs.
# This self-hosted instance forwards a small "wake-up" trigger to ntfy.sh
# so the iOS app gets immediate notifications instead of polling. Topic
# names are visible to ntfy.sh in this mode; message titles and bodies
# stay on the self-hosted instance (the iOS app pulls them directly).
# The access token is set via NTFY_UPSTREAM_ACCESS_TOKEN env var (loaded
# from monitoring/secrets/ntfy.env via Compose env_file).
upstream-base-url: https://ntfy.sh
