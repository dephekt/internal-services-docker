services:
  apprise-api:
    image: caronc/apprise:latest
    container_name: apprise-api
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      - TZ=${TZ}
    volumes:
      - ./apprise:/config
    labels:
      - "pangolin.proxy-resources.apprise-api.name=Apprise"
      - "pangolin.proxy-resources.apprise-api.protocol=http"
      - "pangolin.proxy-resources.apprise-api.full-domain=apprise.${DOMAIN}"
      - "pangolin.proxy-resources.apprise-api.targets[0].method=http"
      - "pangolin.proxy-resources.apprise-api.targets[0].port=8000"
      # Pangolin target health check (apprise-api's /status returns "OK")
      - "pangolin.proxy-resources.apprise-api.targets[0].healthcheck.hostname=apprise-api"
      - "pangolin.proxy-resources.apprise-api.targets[0].healthcheck.port=8000"
      - "pangolin.proxy-resources.apprise-api.targets[0].healthcheck.path=/status"
      - "pangolin.proxy-resources.apprise-api.auth.sso-enabled=true"
      - "pangolin.proxy-resources.apprise-api.auth.sso-roles[0]=Member"
      - "pangolin.proxy-resources.apprise-api.auth.auto-login-idp=1"
      # WUD: semver tags only
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
    networks:
      - monitoring
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8000/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    command: serve
    env_file:
      - config.env
      - secrets/ntfy.env
    environment:
      - TZ=${TZ}
    volumes:
      - ./ntfy/server.yml:/etc/ntfy/server.yml
    labels:
      - "pangolin.proxy-resources.ntfy.name=ntfy"
      - "pangolin.proxy-resources.ntfy.protocol=http"
      - "pangolin.proxy-resources.ntfy.full-domain=ntfy.${DOMAIN}"
      - "pangolin.proxy-resources.ntfy.targets[0].method=http"
      - "pangolin.proxy-resources.ntfy.targets[0].port=80"
      # Pangolin target health check (ntfy's /v1/health returns {"healthy":true})
      - "pangolin.proxy-resources.ntfy.targets[0].healthcheck.hostname=ntfy"
      - "pangolin.proxy-resources.ntfy.targets[0].healthcheck.port=80"
      - "pangolin.proxy-resources.ntfy.targets[0].healthcheck.path=/v1/health"
      # WUD: semver tags only
      - 'wud.tag.include=^\d+\.\d+\.\d+$$'
    networks:
      - monitoring
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://localhost/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  events-watcher:
    build: ./events-watcher
    container_name: events-watcher
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      - APPRISE_URL=http://apprise-api:8000/notify/monitoring
      - STATE_DIR=/state
      - TZ=${TZ}
    volumes:
      - /run/docker.sock:/var/run/docker.sock:ro
      - monitoring-state:/state
    networks:
      - monitoring

  service-checks:
    build: ./service-checks
    container_name: service-checks
    restart: unless-stopped
    env_file:
      - config.env
    environment:
      - APPRISE_URL=http://apprise-api:8000/notify/monitoring
      - LOCAL_XC_URL=http://iptvboss:8001
      - UPSTREAM_XC_URL=http://prime.tnttv.xyz:826/player_api.php
      - CHANNEL_FLOOR=200
      - EPG_MIN_FUTURE_HOURS=6
      - EPG_CANARY_CHANNELS=ABCWICS.us,HallmarkChannel.us,HallmarkFamily.us,CBSKMOV.us,NBCWAND.us,skyhits.uk
      - EPG_CANARY_MIN_FUTURE_PROG=6
      - EPG_CANARY_MIN_FUTURE_HOURS=12
      - EPG_CANARY_MIN_UNIQUE_TITLES=3
      - EXP_WARNING_DAYS=7
      - STATE_DIR=/state
      - TZ=${TZ}
    secrets:
      - IPTV_UPSTREAM_USER.env
      - IPTV_UPSTREAM_PASS.env
      - IPTV_LOCAL_USER.env
      - IPTV_LOCAL_PASS.env
    volumes:
      - ./service-checks/checks:/checks:ro
      # supercronic reads its crontab from the path given on the command line.
      # See service-checks/entrypoint.sh — it execs `supercronic /etc/supercronic/crontab`.
      - ./service-checks/crontab:/etc/supercronic/crontab:ro
      - monitoring-state:/state
    networks:
      - monitoring
      - proxy
    healthcheck:
      test: ["CMD", "pgrep", "supercronic"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  monitoring-state:

networks:
  monitoring:
  proxy:
    external: true

secrets:
  IPTV_UPSTREAM_USER.env:
    file: ./secrets/IPTV_UPSTREAM_USER.env
  IPTV_UPSTREAM_PASS.env:
    file: ./secrets/IPTV_UPSTREAM_PASS.env
  IPTV_LOCAL_USER.env:
    file: ./secrets/IPTV_LOCAL_USER.env
  IPTV_LOCAL_PASS.env:
    file: ./secrets/IPTV_LOCAL_PASS.env
